name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mathboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/mathboard/package-lock.json
      - run: npm ci
      - name: Build
        env:
          VITE_FIREBASE_API_KEY: "AIzaSyDoj97uqdbTD6hat-BnonrF5kwSPnvzhxc"
          VITE_FIREBASE_AUTH_DOMAIN: "mathboard-7bdc0.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "mathboard-7bdc0"
          VITE_FIREBASE_STORAGE_BUCKET: "mathboard-7bdc0.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "591738777010"
          VITE_FIREBASE_APP_ID: "1:591738777010:web:f956f9a8f62a3ca0aa48ab"
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
        run: npm run build
      - name: Disable Jekyll
        run: touch dist/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/mathboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
