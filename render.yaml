services:
  - type: web
    name: mathboard-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements-render.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false        # set this in the Render dashboard — do NOT commit real keys
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
